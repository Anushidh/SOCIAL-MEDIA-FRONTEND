
<div class="max-w-2xl mx-auto px-4 py-6 pb-20 md:pb-6">

  <a routerLink="/settings"
     class="inline-flex items-center gap-1.5 text-sm font-medium mb-6 transition-opacity hover:opacity-70"
     style="color: var(--color-text-muted);">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M15 19l-7-7 7-7"/>
    </svg>
    Settings
  </a>

  <h1 class="mb-1" style="font-family: var(--font-heading); font-size: 1.5rem; font-weight: 400; letter-spacing: -0.02em; color: var(--color-text-primary);">
    Blocked Users
  </h1>
  <p class="text-sm mb-6" style="color: var(--color-text-muted);">Manage the accounts you have blocked.</p>

  <div class="rounded-2xl p-5"
       style="background-color: var(--color-surface); border: 1px solid var(--color-border);">
    @if (blockedLoading) {
      <p class="text-sm text-center py-4" style="color: var(--color-text-muted);">Loading…</p>
    }
    @if (!blockedLoading && blockedUsers.length === 0) {
      <p class="text-sm text-center py-4" style="color: var(--color-text-muted);">No blocked users</p>
    }
    <div class="space-y-0">
      @for (block of blockedUsers; track block.id) {
        <div class="flex items-center justify-between py-4"
             [style.border-bottom]="!$last ? '1px solid var(--color-border)' : 'none'">
          <div class="flex items-center gap-3">
            <app-avatar [url]="block.blocked.avatarUrl" [name]="block.blocked.displayName" size="sm"/>
            <div>
              <p class="text-sm font-semibold" style="color: var(--color-text-primary);">{{ block.blocked.displayName }}</p>
              <p class="text-xs" style="color: var(--color-text-muted); font-family: var(--font-mono);">&#64;{{ block.blocked.username }}</p>
            </div>
          </div>
          <button (click)="unblockUser(block.blockedId)"
                  class="px-3 py-1.5 text-xs font-medium rounded-lg transition-colors unblock-btn"
                  style="border: 1px solid var(--color-border); color: var(--color-text-secondary);">
            Unblock
          </button>
        </div>
      }
    </div>
  </div>
</div>
