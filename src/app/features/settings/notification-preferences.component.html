
    <div class="max-w-2xl mx-auto px-4 py-6 pb-20 md:pb-6">
      <div class="flex items-center gap-2 mb-6">
        <a routerLink="/settings" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </a>
        <h1 class="text-xl font-bold text-gray-900">Notification Preferences</h1>
      </div>

      @if (loading) {
        <div class="bg-white rounded-2xl border border-gray-100 p-5 space-y-5 animate-pulse">
          @for (i of [1,2,3,4,5]; track i) {
            <div class="flex items-center justify-between">
              <div class="h-4 bg-gray-200 rounded w-32"></div>
              <div class="w-10 h-5 bg-gray-200 rounded-full"></div>
            </div>
          }
        </div>
      }

      @if (!loading && prefs) {
        <div class="bg-white rounded-2xl border border-gray-100 p-5">
          <p class="text-sm text-gray-500 mb-5">Choose which notifications you want to receive.</p>
          <div class="space-y-5 divide-y divide-gray-50">
            @for (item of prefItems; track item.key) {
              <div class="flex items-center justify-between pt-4 first:pt-0">
                <div>
                  <p class="text-sm font-medium text-gray-900">{{ item.label }}</p>
                  <p class="text-xs text-gray-400">{{ item.description }}</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" [checked]="prefs[item.key]"
                         (change)="toggle(item.key)" class="sr-only peer">
                  <div class="w-10 h-5 bg-gray-200 rounded-full peer peer-checked:bg-primary-600 after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"></div>
                </label>
              </div>
            }
          </div>
        </div>
      }
    </div>
