
<div class="min-h-screen flex items-center justify-center px-4"
     style="background-color: var(--color-background);">
  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-5"
           style="background-color: var(--color-accent);">
        <span class="text-white font-semibold text-sm" style="font-family: var(--font-heading);">C</span>
      </div>
      <h1 style="font-family: var(--font-heading); font-size: clamp(1.6rem, 4vw, 2rem); font-weight: 400; letter-spacing: -0.02em; color: var(--color-text-primary);">
        Welcome back
      </h1>
      <p class="mt-1 text-sm" style="color: var(--color-text-muted);">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl p-8"
         style="background-color: var(--color-surface); border: 1px solid var(--color-border);">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="space-y-4">

          <div>
            <label class="block text-xs font-medium mb-1.5"
                   style="color: var(--color-text-secondary); font-family: var(--font-mono); letter-spacing: 0.05em; text-transform: uppercase;">
              Email
            </label>
            <input formControlName="email" type="email" placeholder="you@example.com"
                   class="w-full px-4 py-2.5 rounded-lg text-sm transition-colors auth-input focus:outline-none"
                   [class.border-error]="submitted && f['email'].errors"
                   style="border: 1px solid var(--color-border); background-color: var(--color-background); color: var(--color-text-primary); font-family: var(--font-body);">
            @if (submitted && f['email'].errors?.['required']) {
              <p class="text-xs mt-1" style="color: var(--color-error);">Email is required</p>
            }
          </div>

          <div>
            <label class="block text-xs font-medium mb-1.5"
                   style="color: var(--color-text-secondary); font-family: var(--font-mono); letter-spacing: 0.05em; text-transform: uppercase;">
              Password
            </label>
            <input formControlName="password" type="password" placeholder="••••••••"
                   class="w-full px-4 py-2.5 rounded-lg text-sm transition-colors auth-input focus:outline-none"
                   [class.border-error]="submitted && f['password'].errors"
                   style="border: 1px solid var(--color-border); background-color: var(--color-background); color: var(--color-text-primary); font-family: var(--font-body);">
            @if (submitted && f['password'].errors?.['required']) {
              <p class="text-xs mt-1" style="color: var(--color-error);">Password is required</p>
            }
          </div>

          <div class="flex justify-end">
            <a routerLink="/auth/forgot-password"
               class="text-xs font-medium transition-colors auth-link"
               style="color: var(--color-accent);">
              Forgot password?
            </a>
          </div>

          <button type="submit" [disabled]="loading"
                  class="w-full py-2.5 px-4 text-sm font-semibold rounded-lg transition-opacity disabled:opacity-40"
                  style="background-color: var(--color-accent); color: #fff; border: 1px solid var(--color-accent);">
            {{ loading ? 'Signing in…' : 'Sign in' }}
          </button>
        </div>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px" style="background-color: var(--color-border);"></div>
        <span class="text-xs" style="color: var(--color-text-muted); font-family: var(--font-mono);">OR</span>
        <div class="flex-1 h-px" style="background-color: var(--color-border);"></div>
      </div>

      <!-- OAuth -->
      <div class="space-y-2.5">
        <a [href]="googleAuthUrl"
           class="flex items-center justify-center gap-3 w-full py-2.5 px-4 rounded-lg text-sm font-medium transition-colors oauth-btn"
           style="border: 1px solid var(--color-border); color: var(--color-text-primary);">
          <svg class="w-4.5 h-4.5" style="width:18px;height:18px;" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </a>
        <a [href]="facebookAuthUrl"
           class="flex items-center justify-center gap-3 w-full py-2.5 px-4 rounded-lg text-sm font-medium transition-colors oauth-btn"
           style="border: 1px solid var(--color-border); color: var(--color-text-primary);">
          <svg style="width:18px;height:18px;" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Continue with Facebook
        </a>
      </div>
    </div>

    <p class="text-center text-sm mt-6" style="color: var(--color-text-muted);">
      Don't have an account?
      <a routerLink="/auth/register" class="font-medium ml-1 auth-link" style="color: var(--color-accent);">Sign up</a>
    </p>
  </div>
</div>
