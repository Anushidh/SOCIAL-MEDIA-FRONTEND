<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-md p-8">

    <div class="text-center mb-6">
      <div class="text-4xl mb-3">📧</div>
      <h1 class="text-2xl font-bold text-gray-900">Verify your email</h1>
      <p class="text-gray-500 mt-2 text-sm">
        We sent a 6-digit code to <span class="font-medium text-gray-700">{{ email }}</span>
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="mb-5">
        <label for="otp" class="block text-sm font-medium text-gray-700 mb-1">Verification code</label>
        <input
          id="otp"
          type="text"
          formControlName="otp"
          maxlength="6"
          inputmode="numeric"
          autocomplete="one-time-code"
          placeholder="_ _ _ _ _ _"
          class="w-full border rounded-lg px-4 py-3 text-center text-2xl tracking-[0.5em] font-mono focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.border-red-500]="submitted && f['otp'].invalid"
        />
        @if (submitted && f['otp'].errors?.['required']) {
          <p class="text-red-500 text-xs mt-1">Please enter the code</p>
        }
        @if (submitted && f['otp'].errors?.['minlength']) {
          <p class="text-red-500 text-xs mt-1">Code must be 6 digits</p>
        }
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold py-3 rounded-lg transition"
      >
        {{ loading ? 'Verifying...' : 'Verify Email' }}
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-500">
      Didn't receive the code?
      <button
        (click)="resendOtp()"
        [disabled]="resending"
        class="ml-1 text-blue-600 hover:underline disabled:opacity-50 font-medium"
      >
        {{ resending ? 'Sending...' : 'Resend' }}
      </button>
    </div>

  </div>
</div>
