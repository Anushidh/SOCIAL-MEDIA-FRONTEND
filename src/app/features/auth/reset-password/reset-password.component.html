
<div class="min-h-screen flex items-center justify-center px-4"
     style="background-color: var(--color-background);">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-5"
           style="background-color: var(--color-accent);">
        <span class="text-white font-semibold text-sm" style="font-family: var(--font-heading);">S</span>
      </div>
      <h1 style="font-family: var(--font-heading); font-size: clamp(1.6rem, 4vw, 2rem); font-weight: 400; letter-spacing: -0.02em; color: var(--color-text-primary);">
        Reset your password
      </h1>
      <p class="mt-1 text-sm" style="color: var(--color-text-muted);">Enter a new password for your account</p>
    </div>

    <div class="rounded-2xl p-8"
         style="background-color: var(--color-surface); border: 1px solid var(--color-border);">
      @if (!token) {
        <p class="text-center text-sm" style="color: var(--color-error);">
          Invalid or missing reset token.
          <a routerLink="/auth/forgot-password" class="font-medium ml-1 auth-link" style="color: var(--color-accent);">
            Request a new one
          </a>
        </p>
      } @else {
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-medium mb-1.5"
                     style="color: var(--color-text-secondary); font-family: var(--font-mono); letter-spacing: 0.05em; text-transform: uppercase;">
                New Password
              </label>
              <input formControlName="newPassword" type="password" placeholder="Min 8 characters"
                     class="w-full px-4 py-2.5 rounded-lg text-sm transition-colors auth-input focus:outline-none"
                     [class.border-error]="submitted && form.get('newPassword')?.errors"
                     style="border: 1px solid var(--color-border); background-color: var(--color-background); color: var(--color-text-primary); font-family: var(--font-body);">
              @if (submitted && form.get('newPassword')?.errors?.['minlength']) {
                <p class="text-xs mt-1" style="color: var(--color-error);">At least 8 characters required</p>
              }
            </div>
            <button type="submit" [disabled]="loading"
                    class="w-full py-2.5 px-4 text-sm font-semibold rounded-lg transition-opacity disabled:opacity-40"
                    style="background-color: var(--color-accent); color: #fff; border: 1px solid var(--color-accent);">
              {{ loading ? 'Resetting…' : 'Reset password' }}
            </button>
          </div>
        </form>
      }
    </div>
  </div>
</div>
