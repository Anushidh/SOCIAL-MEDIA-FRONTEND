<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-primary-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <span class="text-white text-2xl font-bold">S</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Reset your password</h1>
      <p class="text-gray-500 mt-1">Enter a new password for your account</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      @if (!token) {
        <p class="text-center text-red-500 text-sm">
          Invalid or missing reset token.
          <a routerLink="/auth/forgot-password" class="text-primary-600 font-medium">Request a new one</a>
        </p>
      } @else {
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">New Password</label>
              <input formControlName="newPassword" type="password" placeholder="Min 8 characters"
                     class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm"
                     [class.border-red-300]="submitted && form.get('newPassword')?.errors">
              @if (submitted && form.get('newPassword')?.errors?.['minlength']) {
                <p class="text-xs text-red-500 mt-1">At least 8 characters required</p>
              }
            </div>
            <button type="submit" [disabled]="loading"
                    class="w-full py-2.5 px-4 bg-primary-600 hover:bg-primary-700 disabled:opacity-50 text-white font-semibold rounded-lg transition-colors">
              {{ loading ? 'Resetting…' : 'Reset password' }}
            </button>
          </div>
        </form>
      }
    </div>
  </div>
</div>
