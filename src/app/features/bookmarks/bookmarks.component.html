
    <div class="max-w-2xl mx-auto px-4 py-6 pb-20 md:pb-6">

      <h1 class="mb-5" style="font-family: var(--font-heading); font-size: 1.5rem; font-weight: 400; letter-spacing: -0.02em; color: var(--color-text-primary);">
        Saved Posts
      </h1>

      <!-- Skeleton -->
      @if (loading && posts.length === 0) {
        <div class="space-y-3">
          @for (i of [1,2,3]; track i) {
            <div class="rounded-xl p-4 animate-pulse"
                 style="background-color: var(--color-surface); border: 1px solid var(--color-border);">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-8 h-8 rounded-full" style="background-color: var(--color-border);"></div>
                <div class="flex-1">
                  <div class="h-3 rounded w-24" style="background-color: var(--color-border);"></div>
                </div>
              </div>
              <div class="h-3 rounded w-full mb-1.5" style="background-color: var(--color-border);"></div>
              <div class="h-3 rounded w-2/3" style="background-color: var(--color-border);"></div>
            </div>
          }
        </div>
      }

      <!-- Empty -->
      @if (!loading && posts.length === 0) {
        <div class="text-center py-16 rounded-2xl"
             style="background-color: var(--color-surface); border: 1px solid var(--color-border);">
          <svg class="w-10 h-10 mx-auto mb-3" style="color: var(--color-border);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
          </svg>
          <p class="font-medium" style="color: var(--color-text-muted); font-family: var(--font-heading); font-size: 1rem;">
            No saved posts yet
          </p>
          <p class="text-sm mt-1" style="color: var(--color-text-muted);">Bookmark posts to find them here later</p>
        </div>
      }

      <div class="space-y-3">
        @for (post of posts; track post.id) {
          <app-post-card [post]="post"
            [currentUserId]="currentUserId"
            (liked)="toggleLike($event)"
            (bookmarked)="removeBookmark($event)"
            (reposted)="toggleRepost($event)"
            (reported)="reportingPost = $event"
            (deleted)="deletePost($event)"/>
        }
      </div>

      @if (hasMore) {
        <div class="text-center mt-6">
          <button (click)="loadMore()" [disabled]="loading"
                  class="text-xs font-medium transition-opacity disabled:opacity-40 hover:opacity-70"
                  style="color: var(--color-accent); font-family: var(--font-mono);">
            Load more
          </button>
        </div>
      }

      @if (reportingPost) {
        <app-report-modal
          [entityId]="reportingPost.id"
          entityType="post"
          (reported)="handleReported()"
          (close)="reportingPost = null"/>
      }
    </div>
