
    <div class="max-w-2xl mx-auto px-4 py-6 pb-20 md:pb-6">
      <!-- Tabs -->
      <div class="flex bg-white rounded-xl border border-gray-100 mb-5">
        <button (click)="switchTab('followers')"
           class="flex-1 py-2.5 text-sm font-medium text-center rounded-xl transition-colors"
           [class.bg-primary-600]="activeTab === 'followers'"
           [class.text-white]="activeTab === 'followers'"
           [class.text-gray-500]="activeTab !== 'followers'">
          Followers
        </button>
        <button (click)="switchTab('following')"
           class="flex-1 py-2.5 text-sm font-medium text-center rounded-xl transition-colors"
           [class.bg-primary-600]="activeTab === 'following'"
           [class.text-white]="activeTab === 'following'"
           [class.text-gray-500]="activeTab !== 'following'">
          Following
        </button>
      </div>

      @if (loading && users.length === 0) {
        <div class="space-y-2">
          @for (i of [1,2,3,4,5]; track i) {
            <div class="bg-white rounded-xl border border-gray-100 p-3.5 flex items-center gap-3 animate-pulse">
              <div class="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0"></div>
              <div class="flex-1">
                <div class="h-3 bg-gray-200 rounded w-28 mb-1.5"></div>
                <div class="h-2 bg-gray-100 rounded w-20"></div>
              </div>
            </div>
          }
        </div>
      }

      @if (!loading && users.length === 0) {
        <div class="text-center py-12">
          <p class="text-gray-400">No {{ activeTab }} yet</p>
        </div>
      }

      <div class="space-y-2">
        @for (user of users; track user.id) {
          <div class="bg-white rounded-xl border border-gray-100 p-3.5 flex items-center gap-3">
            <a [routerLink]="['/profile', user.username]" class="flex items-center gap-3 flex-1 min-w-0">
              <app-avatar [url]="user.avatarUrl" [name]="user.displayName" size="md"/>
              <div class="min-w-0">
                <p class="font-semibold text-sm text-gray-900 truncate">{{ user.displayName }}</p>
                <p class="text-xs text-gray-400 truncate">&#64;{{ user.username }}</p>
              </div>
            </a>
            @if (user.id !== currentUserId) {
              <button (click)="toggleFollow(user)"
                      class="px-3 py-1.5 text-xs font-semibold rounded-full border transition-colors flex-shrink-0"
                      [class.bg-primary-600]="!user['isFollowing'] && !user['isRequested']"
                      [class.text-white]="!user['isFollowing'] && !user['isRequested']"
                      [class.border-transparent]="!user['isFollowing'] && !user['isRequested']"
                      [class.border-gray-200]="user['isFollowing'] || user['isRequested']"
                      [class.text-gray-600]="user['isFollowing'] || user['isRequested']">
                @if (user['isFollowing']) {
                  Following
                } @else if (user['isRequested']) {
                  Requested
                } @else {
                  Follow
                }
              </button>
            }
          </div>
        }
      </div>

      @if (hasMore) {
        <div class="text-center mt-5">
          <button (click)="loadMore()" [disabled]="loading"
                  class="text-sm text-primary-600 hover:text-primary-700 font-medium disabled:opacity-50">
            Load more
          </button>
        </div>
      }
    </div>
