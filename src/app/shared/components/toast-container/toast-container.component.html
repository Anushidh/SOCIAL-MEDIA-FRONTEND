<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-sm font-medium pointer-events-auto min-w-[260px] max-w-[360px] animate-slide-in"
         [ngClass]="{
           'bg-green-500 text-white': toast.type === 'success',
           'bg-red-500 text-white': toast.type === 'error',
           'bg-blue-500 text-white': toast.type === 'info',
           'bg-yellow-500 text-white': toast.type === 'warning'
         }">
      <span class="flex-1">{{ toast.message }}</span>
      <button (click)="toastService.remove(toast.id)" class="opacity-75 hover:opacity-100">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  }
</div>
