
<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium pointer-events-auto min-w-[280px] max-w-[360px] animate-slide-in"
         style="background-color: var(--color-surface); border: 1px solid var(--color-border); box-shadow: 0 8px 24px rgba(0,0,0,0.08);"
         [style.border-left-width]="'3px'"
         [style.border-left-color]="toast.type === 'success' ? 'var(--color-success)'
                                   : toast.type === 'error'   ? 'var(--color-error)'
                                   : toast.type === 'warning' ? '#D97706'
                                   : 'var(--color-accent)'">

      <!-- Icon -->
      <span class="shrink-0"
            [style.color]="toast.type === 'success' ? 'var(--color-success)'
                          : toast.type === 'error'   ? 'var(--color-error)'
                          : toast.type === 'warning' ? '#D97706'
                          : 'var(--color-accent)'">
        @if (toast.type === 'success') {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        }
        @if (toast.type === 'error') {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        }
        @if (toast.type === 'info') {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/>
          </svg>
        }
        @if (toast.type === 'warning') {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          </svg>
        }
      </span>

      <!-- Message -->
      <span class="flex-1" style="color: var(--color-text-primary); font-family: var(--font-body);">
        {{ toast.message }}
      </span>

      <!-- Dismiss -->
      <button (click)="toastService.remove(toast.id)"
              class="shrink-0 transition-opacity hover:opacity-60"
              style="color: var(--color-text-muted);">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  }
</div>
