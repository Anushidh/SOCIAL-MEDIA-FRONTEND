
    <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" (click)="close.emit()">
      <div class="bg-white rounded-2xl w-full max-w-sm p-5" (click)="$event.stopPropagation()">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-gray-900">Report content</h2>
          <button (click)="close.emit()" class="text-gray-400 hover:text-gray-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <p class="text-sm text-gray-500 mb-4">Why are you reporting this?</p>

        <div class="space-y-2 mb-4">
          @for (r of reasons; track r.value) {
            <label class="flex items-center gap-3 p-2.5 rounded-lg hover:bg-gray-50 cursor-pointer">
              <input type="radio" [value]="r.value" [(ngModel)]="selectedReason"
                     class="text-primary-600 focus:ring-primary-500">
              <span class="text-sm text-gray-700">{{ r.label }}</span>
            </label>
          }
        </div>

        @if (selectedReason === 'other') {
          <textarea [(ngModel)]="description" placeholder="Please describe the issue…" rows="2"
                    class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 resize-none mb-4">
          </textarea>
        }

        <button (click)="submit()" [disabled]="!selectedReason || submitting"
                class="w-full py-2.5 bg-red-500 hover:bg-red-600 disabled:opacity-50 text-white text-sm font-semibold rounded-lg transition-colors">
          {{ submitting ? 'Submitting…' : 'Submit Report' }}
        </button>
      </div>
    </div>
