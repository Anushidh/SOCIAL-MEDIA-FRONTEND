<div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
     (click)="cancelled.emit()">
  <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl"
       (click)="$event.stopPropagation()">

    <!-- Icon -->
    <div class="flex items-center justify-center w-12 h-12 rounded-full bg-red-50 mx-auto mb-4">
      <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </div>

    <h2 class="text-base font-bold text-gray-900 text-center mb-1">{{ title }}</h2>

    @if (message) {
      <p class="text-sm text-gray-500 text-center mb-5">{{ message }}</p>
    } @else {
      <div class="mb-5"></div>
    }

    <div class="flex gap-3">
      <button (click)="cancelled.emit()"
              class="flex-1 py-2.5 text-sm font-semibold border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors text-gray-700">
        Cancel
      </button>
      <button (click)="confirmed.emit()"
              [disabled]="loading"
              [class]="'flex-1 py-2.5 text-sm font-semibold rounded-xl transition-colors disabled:opacity-50 ' + confirmClass">
        {{ loading ? 'Deleting…' : confirmLabel }}
      </button>
    </div>
  </div>
</div>
