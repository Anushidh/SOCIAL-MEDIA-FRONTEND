@if (url) {
  <img
    [src]="url"
    [alt]="safeName"
    [class]="sizeClass + ' rounded-full object-cover flex-shrink-0'">
} @else {
  <div [class]="sizeClass + ' rounded-full flex items-center justify-center flex-shrink-0'"
       style="background-color: color-mix(in srgb, var(--color-accent) 12%, transparent);">
    <span [class]="textClass + ' font-semibold uppercase'"
          style="color: var(--color-accent);">
      {{ safeName[0] || '?' }}
    </span>
  </div>
}
